<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo de Adivinhação</title>
    <style>
       
        body {
            background-color: #f0f4f8; 
            display: flex;
            flex-direction: column;
            align-items: center; /* Centralização horizontal */
            justify-content: center; /* Centralização vertical */
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #game-container {
            padding: 20px;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body id="main-body">

    <div id="game-container">
        <h1>Adivinhe o Número (0 a 99)</h1>
        <input type="number" id="userGuess" min="0" max="99" placeholder="Digite seu palpite">
        <br>
        <button onclick="checkGuess()">Verificar</button>
        <p id="message"></p>
    </div>

    <script>
        
        const randomNumber = Math.floor(Math.random() * 100);
        console.log("Dica para teste: " + randomNumber); 

        function checkGuess() {
            const guessInput = document.getElementById("userGuess");
            const message = document.getElementById("message");
            const body = document.getElementById("main-body");
            const userValue = parseInt(guessInput.value);

            // Estrutura de condição if para verificar o valor
            if (userValue === randomNumber) {
                message.innerText = "Parabéns! Você acertou!";
                body.style.setProperty("background-color", "green");
            } 
            else if (userValue > randomNumber) {
                message.innerText = "Muito alto! Tente um número menor.";
                // Altera cor de fundo para vermelho se errar
                body.style.setProperty("background-color", "red");
            } 
            else {
                message.innerText = "Muito baixo! Tente um número maior.";
                // Altera cor de fundo para vermelho se errar
                body.style.setProperty("background-color", "red");
            }
        }
    </script>
</body>
</html>
