<!DOCTYPE html>
<html>
<head>
    <title>Cadastrar Post</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <h1>Novo Post</h1>

    <form action="/salvar_post" method="POST">

        <input
            type="text"
            name="titulo"
            placeholder="Título"
            required
        >

        <br><br>

        <input
            type="text"
            name="resumo"
            placeholder="Resumo"
            required
        >

        <br><br>

        <textarea
            name="conteudo"
            placeholder="Conteúdo"
            required
        ></textarea>

        <br><br>

        <button type="submit">
            Salvar Post
        </button>

    </form>

</body>
</html>
